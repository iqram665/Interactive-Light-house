<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Interactive Lighthouse</title>

    <style>

        body {

            margin: 0;

            padding: 0;

            background-color: #0b0d19;

            display: flex;

            justify-content: center;

            align-items: center;

            min-height: 100vh;

            overflow: hidden;

            font-family: Arial, sans-serif;

        }



        /* Main animation canvas */

        #gameCanvas {

            width: 800px;

            height: 464px;

            background: linear-gradient(to bottom, #11152b, #26365f, #c7817d);

            position: relative;

            border: 4px solid #fff;

            border-radius: 12px;

            overflow: hidden;

            box-shadow: 0 10px 30px rgba(0,0,0,0.6);

        }



        /* Beautiful mountain layer (Clip Path দিয়ে তৈরি) */

        .mountains {

            position: absolute;

            bottom: 60px;

            width: 100%;

            height: 180px;

            background: #181d33;

            clip-path: polygon(0% 100%, 0% 70%, 15% 45%, 30% 75%, 55% 35%, 75% 65%, 90% 40%, 100% 55%, 100% 100%);

            opacity: 0.9;

        }



        /* Ocean layer*/

        .sea {

            position: absolute;

            bottom: 0;

            width: 100%;

            height: 70px;

            background: linear-gradient(to bottom, #090d1a, #03050a);

            z-index: 5;

        }



        /* Lighthouse tower (positioned on the left side) */

        #Lighthouse {

            position: absolute;

            bottom: 60px;

            left: 80px;

            width: 40px;

            height: 180px;

            background: #090b14;

            clip-path: polygon(25% 0%, 75% 0%, 100% 100%, 0% 100%);

            z-index: 6;

        }



        /* Lighthouse light center (which will be positioned by JS) */

        #light_center {

            position: absolute;

            width: 12px;

            height: 12px;

            background: #fff;

            border-radius: 50%;

            box-shadow: 0 0 25px #fff, 0 0 50px #ffea79;

            z-index: 10;

            pointer-events: none;

        }



        /* Rotating light beam (Light Beam) */

        #Light {

            position: absolute;

            top: 50%;

            left: 50%;

            width: 500px;

            height: 80px;

            /* Rotating light effect */

            background: linear-gradient(to right, rgba(255, 234, 121, 0.8), rgba(255, 234, 121, 0.15) 50%, transparent);

            clip-path: polygon(0% 45%, 100% 0%, 100% 100%, 0% 55%);

            transform-origin: left center;

            transform: rotate(0deg);

        }



        /* CSS rotation frames */

        @keyframes rotate {

            0% { transform: rotate(0deg); }

            100% { transform: rotate(360deg); }

        }

    </style>

</head>

<body>



    <div id="gameCanvas">

        <div class="mountains"></div>

        <div class="sea"></div>

        

        <div id="Lighthouse"></div>

    </div>



    <div id="light_center">

        <div id="Light"></div>

    </div>
    <div class="house">
    <div class="floor"></div>
    <div class="floor"></div>
    <div class="floor"></div>
    <div class="floor"></div>
    <div class="floor"></div>
</div>



    <script>

        const center = document.getElementById("light_center");

        const hand = document.getElementById("Light");



        function setLightCenter() {

            // The rotation of the light is currently set to 0 degrees for ease of calculation.

            hand.style.transform = "rotate(0deg)";

            

            // Lighthouse tower's live position measurement

            var bbox = document.getElementById("Lighthouse").getBoundingClientRect();

            

            // Setting the focal point of light right in the middle of the top of the tower

            // Here it is offset 10 pixels down and 15 pixels right for perfect alignment.

            center.style.top = `calc(${bbox.top}px + 10px)`;

            center.style.left = `calc(${bbox.left}px + 15px)`;

        }



        function resetAnimation() {

            hand.style.transform = "rotate(0deg)";

            // As shown in the screenshot, it will rotate a full circle in 10 seconds (infinite)

            hand.style.animation = "rotate 10s linear infinite";

        }



        // When the page loads and when the window is resized, the light's position will be automatically adjusted

        window.addEventListener("load", () => {

            setLightCenter();

            resetAnimation();

        });

        window.addEventListener("resize", setLightCenter);

    </script>



</body>

</html>
